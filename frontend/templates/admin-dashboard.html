<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Farmer Equipment Rental System</title>
    <link rel="stylesheet" href="../src/main/resources/static/css/style.css">
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
        <nav>
            <a href="profile.html">Profile</a>
            <a href="index.html">Logout</a>
        </nav>
    </header>
    <main>
        <section class="admin-dashboard">
            <h2>System Administration</h2>
            
            <div class="admin-stats">
                <div class="stat-card">
                    <h3>Total Users</h3>
                    <p>245</p>
                </div>
                <div class="stat-card">
                    <h3>Total Equipment</h3>
                    <p>87</p>
                </div>
                <div class="stat-card">
                    <h3>Total Bookings</h3>
                    <p>523</p>
                </div>
                <div class="stat-card">
                    <h3>Total Revenue</h3>
                    <p>$45,300.00</p>
                </div>
            </div>
            
            <section class="admin-controls">
                <h3>Management</h3>
                <button>Manage Users</button>
                <button>Manage Equipment</button>
                <button>View Reports</button>
                <button>System Settings</button>
            </section>
            
            <section class="recent-activity">
                <h3>Recent Activity</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Activity</th>
                            <th>User</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Activity rows will go here -->
                    </tbody>
                </table>
            </section>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Farmer Equipment Rental System. All rights reserved.</p>
    </footer>
</body>
</html>
