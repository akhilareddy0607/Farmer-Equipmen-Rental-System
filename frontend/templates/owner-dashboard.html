<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - Farmer Equipment Rental System</title>
    <link rel="stylesheet" href="../src/main/resources/static/css/style.css">
</head>
<body>
    <header>
        <h1>Equipment Owner Dashboard</h1>
        <nav>
            <a href="profile.html">Profile</a>
            <a href="index.html">Logout</a>
        </nav>
    </header>
    <main>
        <section class="dashboard">
            <h2>Welcome, Equipment Owner!</h2>
            
            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3>Total Equipment</h3>
                    <p>8</p>
                </div>
                <div class="stat-card">
                    <h3>Active Rentals</h3>
                    <p>3</p>
                </div>
                <div class="stat-card">
                    <h3>Total Earnings</h3>
                    <p>$5,200.00</p>
                </div>
            </div>
            
            <section class="equipment-management">
                <h3>My Equipment</h3>
                <button>Add New Equipment</button>
                <table>
                    <thead>
                        <tr>
                            <th>Equipment Name</th>
                            <th>Category</th>
                            <th>Price/Day</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Equipment rows will go here -->
                    </tbody>
                </table>
            </section>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Farmer Equipment Rental System. All rights reserved.</p>
    </footer>
</body>
</html>
