<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Dashboard - Farmer Equipment Rental System</title>
    <link rel="stylesheet" href="../src/main/resources/static/css/style.css">
</head>
<body>
    <header>
        <h1>Farmer Dashboard</h1>
        <nav>
            <a href="profile.html">Profile</a>
            <a href="index.html">Logout</a>
        </nav>
    </header>
    <main>
        <section class="dashboard">
            <h2>Welcome, Farmer!</h2>
            
            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3>Active Bookings</h3>
                    <p>5</p>
                </div>
                <div class="stat-card">
                    <h3>Completed Bookings</h3>
                    <p>12</p>
                </div>
                <div class="stat-card">
                    <h3>Total Spent</h3>
                    <p>$1,250.00</p>
                </div>
            </div>
            
            <section class="bookings">
                <h3>My Bookings</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Equipment</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Booking rows will go here -->
                    </tbody>
                </table>
            </section>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Farmer Equipment Rental System. All rights reserved.</p>
    </footer>
</body>
</html>
